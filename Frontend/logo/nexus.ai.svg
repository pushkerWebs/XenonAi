<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Rounded square container — always black regardless of theme -->
  <rect x="2" y="2" width="28" height="28" rx="8" ry="8" fill="#000000" stroke="#404040" stroke-width="1.5"/>
  <!-- Stylized "X" lettermark -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="#d4d4d4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="10" y2="22" stroke="#d4d4d4" stroke-width="2.5" stroke-linecap="round"/>
</svg>